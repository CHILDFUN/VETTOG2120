<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SOL HUB Dashboard</title>

<link rel="stylesheet" href="css/dashboard.css">

</head>

<body>

<div class="sidebar">

<h2>SOL HUB</h2>

<ul>

<li onclick="window.location='dashboard.html'">🏠 Dashboard</li>

<li onclick="window.location='members.html'">👥 Members</li>

<li onclick="window.location='chat.html'">💬 Chat</li>

<li onclick="window.location='events.html'">📅 Events</li>

<li onclick="window.location='giftcodes.html'">🎁 Gift Codes</li>

<li onclick="logout()">🚪 Logout</li>

</ul>

</div>

<div class="content">

<h1 id="welcome"></h1>

<div class="cards">

<div class="card">
<h3>Total Members</h3>
<p>132</p>
</div>

<div class="card">
<h3>Online</h3>
<p>41</p>
</div>

<div class="card">
<h3>Events</h3>
<p>5</p>
</div>

<div class="card">
<h3>Gift Codes</h3>
<p>12</p>
</div>

</div>

</div>

<script>

const user = JSON.parse(localStorage.getItem("solUser"));

if(!user){
    window.location.href="login.html";
}

document.getElementById("welcome").innerHTML =
"Welcome, " + user.name;

function logout(){

localStorage.removeItem("solUser");

window.location.href="login.html";

}

</script>

</body>
</html>
