<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SOL HUB - Admin Panel</title>

<link rel="stylesheet" href="css/admin.css">

</head>

<body>

<script>

// حماية الصفحة
const user = JSON.parse(localStorage.getItem("solUser"));

if(!user){

    window.location.href="login.html";

}

if(user.role!="admin"){

    alert("Access Denied!");

    window.location.href="dashboard.html";

}

</script>

<div class="sidebar">

<h2>SOL ADMIN</h2>

<ul>

<li>📊 Dashboard</li>

<li>👥 Members</li>

<li>💬 Chat</li>

<li>📅 Events</li>

<li>🎁 Gift Codes</li>

<li>📰 News</li>

<li>⚙ Settings</li>

<li onclick="logout()">🚪 Logout</li>

</ul>

</div>

<div class="main">

<h1 id="adminName"></h1>

<div class="stats">

<div class="box">
<h3>Members</h3>
<p>132</p>
</div>

<div class="box">
<h3>Online</h3>
<p>41</p>
</div>

<div class="box">
<h3>Events</h3>
<p>5</p>
</div>

<div class="box">
<h3>Gift Codes</h3>
<p>12</p>
</div>

</div>

<h2>Administrator Control Panel</h2>

<p>You have full access to manage SOL HUB.</p>

</div>

<script>

document.getElementById("adminName").innerHTML =
"Welcome " + user.name;

function logout(){

localStorage.removeItem("solUser");

window.location.href="login.html";

}

</script>

</body>

</html>
